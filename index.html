<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebular Art</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0d1117;
color:#fff;
}

header{
padding:80px 20px;
text-align:center;
}

header h1{
font-size:60px;
letter-spacing:4px;
}

header p{
margin-top:15px;
color:#b3b3b3;
font-size:18px;
}

.gallery{
max-width:1300px;
margin:auto;
padding:40px 20px 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:320px;
object-fit:cover;
border-radius:16px;
transition:.35s;
box-shadow:0 8px 25px rgba(0,0,0,.4);
}

.gallery img:hover{
transform:translateY(-8px) scale(1.02);
}

footer{
text-align:center;
padding:30px;
color:#888;
border-top:1px solid #222;
}
</style>

</head>
<body>

<header>

<h1>NEBULAR ART</h1>

<p>
Digital Illustration • Fantasy • Landscape • Anime • Pop Art
</p>

</header>

<section class="gallery">

<img src="images/art1.jpg" alt="">
<img src="images/art2.jpg" alt="">
<img src="images/art3.jpg" alt="">
<img src="images/art4.jpg" alt="">
<img src="images/art5.jpg" alt="">
<img src="images/art6.jpg" alt="">
<img src="images/art7.jpg" alt="">
<img src="images/art8.jpg" alt="">

</section>

<footer>

© 2026 Nebular Art. All Rights Reserved.

</footer>

</body>
</html>
